<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680" role="img" aria-labelledby="title description">
  <title id="title">Supa.cc terminal interface</title>
  <desc id="description">The compact Supa.cc home shows three saved accounts, the active account, and Add, Switch, Remove, and Exit actions.</desc>
  <rect width="1100" height="680" rx="28" fill="#101312"/>
  <rect x="1" y="1" width="1098" height="678" rx="27" fill="none" stroke="#303633" stroke-width="2"/>
  <rect x="1" y="1" width="1098" height="62" rx="27" fill="#1A1E1C"/>
  <rect x="1" y="38" width="1098" height="25" fill="#1A1E1C"/>
  <circle cx="36" cy="31" r="8" fill="#FF5F57"/>
  <circle cx="62" cy="31" r="8" fill="#FEBC2E"/>
  <circle cx="88" cy="31" r="8" fill="#28C840"/>
  <text x="550" y="38" text-anchor="middle" fill="#8B9691" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">supa.cc</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" xml:space="preserve">
    <text x="80" y="115" fill="#00D388"> ____</text>
    <text x="80" y="145" fill="#00D388">/ ___| _   _ _ __   __ _   ___ ___</text>
    <text x="80" y="175" fill="#00D388">\___ \| | | | '_ \ / _` | / __/ __|</text>
    <text x="80" y="205" fill="#00D388"> ___) | |_| | |_) | (_| || (_| (__</text>
    <text x="80" y="235" fill="#00D388">|____/ \__,_| .__/ \__,_(_)___\___|</text>
    <text x="80" y="265" fill="#00D388">            |_|</text>

    <text x="80" y="315" fill="#FFFFFF" font-weight="700">Supa.cc · Secure local management for Supabase accounts.</text>
    <text x="80" y="355" fill="#808A85">3 saved accounts · Active: work</text>

    <text x="80" y="420" fill="#FFFFFF" font-weight="700">? Choose an action:</text>
    <text x="80" y="462" fill="#00D388" font-weight="700">❯ Add account</text>
    <text x="107" y="502" fill="#D7DDD9">Switch active account</text>
    <text x="107" y="542" fill="#D7DDD9">Remove account</text>
    <text x="107" y="582" fill="#D7DDD9">Exit</text>
    <text x="80" y="630" fill="#65706A" font-size="18">Use arrow keys to move · Enter to select</text>
  </g>
</svg>
