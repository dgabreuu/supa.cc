name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.x"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Validate POSIX installer
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bash -n install.sh
          bash install.sh --dry-run --yes
      - name: Validate PowerShell installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path .\install.ps1),
            [ref] $tokens,
            [ref] $errors
          ) | Out-Null
          if ($errors.Count -ne 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
          .\install.ps1 -DryRun -Yes
      - name: Install development dependencies
        run: |
          python -m pip install --upgrade "pip>=26.1.2"
          python -m pip install -e ".[dev]"
      - name: Test and validate dependencies
        run: |
          python -m pytest
          python -m pip check
          pip-audit --skip-editable
          python scripts/runtime_requirements.py runtime-requirements.txt
          pip-audit --requirement runtime-requirements.txt
      - name: Build artifacts
        run: python -m build
      - name: Inspect artifact members
        run: python scripts/inspect_artifacts.py dist
      - name: Install wheel in isolated environment
        shell: bash
        run: |
          python -m venv wheel-test
          wheel-test/bin/python -m pip install dist/*.whl
          wheel-test/bin/python -m pip check
          wheel-test/bin/supa.cc --version
          wheel-test/bin/supa.cc version
        if: runner.os != 'Windows'
      - name: Install wheel in isolated Windows environment
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m venv wheel-test
          $wheel = (Get-ChildItem dist\*.whl).FullName
          wheel-test\Scripts\python.exe -m pip install $wheel
          wheel-test\Scripts\python.exe -m pip check
          wheel-test\Scripts\supa.cc.exe --version
          wheel-test\Scripts\supa.cc.exe version
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: packages-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*

  linux-distributions:
    strategy:
      matrix:
        include:
          - image: fedora@sha256:6c75d5bf57cb0fa5aa4b92c6a83c86c791644496d9ac230de7711f5b8ec3b898
            install: dnf install -y python3 python3-pip
          - image: archlinux@sha256:fe6972d4dc1f660c0c10f4c41b2de8986bab89e7e2955378f8beadb8ebcd7433
            install: pacman -Syu --noconfirm python python-pip
    runs-on: ubuntu-latest
    container: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install Python
        run: ${{ matrix.install }}
      - name: Test environment behavior and build without Secret Service
        run: |
          python3 -m pip install --break-system-packages --upgrade "pip>=26.1.2"
          python3 -m pip install --break-system-packages -e ".[dev]"
          python3 -m pytest -m "not real_keychain and not real_secret_service" tests/test_environment.py tests/test_installation.py tests/test_linux_secret_service_smoke.py
          python3 -m build
          python3 -m pip check

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install collection dependencies
        run: |
          python -m pip install --upgrade "pip>=26.1.2"
          python -m pip install -e ".[dev]"
      - name: Scan tracked files and complete history
        run: python scripts/security_scan.py --tracked --history
      - name: Reject credentials in pytest collection metadata
        run: |
          python -m pytest --cache-clear --collect-only -q
          python scripts/security_scan.py --path .pytest_cache
