name: Publish release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Published immutable release tag to build and publish"
        required: true
        default: "v0.5.5"

permissions: {}

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || (github.event.release.draft == false && github.event.release.prerelease == false)
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
    permissions:
      contents: read
    steps:
      - name: Require stable published release
        if: github.event_name == 'release'
        env:
          RELEASE_DRAFT: ${{ github.event.release.draft }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [ "$RELEASE_DRAFT" != "false" ] || [ "$RELEASE_PRERELEASE" != "false" ]; then
            echo "Refusing to build a draft or prerelease."
            exit 1
          fi
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Validate release tag and package version
        env:
          RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          expected_tag = f"v{version}"
          if os.environ["RELEASE_TAG"] != expected_tag:
              raise SystemExit(f"release tag must be {expected_tag}")
          PY
      - name: Install development dependencies
        run: |
          python -m pip install --upgrade "pip>=26.1.2"
          python -m pip install -e ".[dev]"
      - name: Test and validate dependencies
        shell: bash
        run: |
          python_bin="$(command -v python)"
          python_dir="${python_bin%/*}"
          clean_path="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          PATH="$clean_path" "$python_bin" scripts/security_scan.py --tracked --history
          PATH="$clean_path" "$python_bin" -m pytest --cache-clear --collect-only -q
          PATH="$clean_path" "$python_bin" scripts/security_scan.py --path .pytest_cache
          PATH="$clean_path" "$python_bin" -m pytest
          PATH="$clean_path" "$python_bin" -m pip check
          PATH="$clean_path" "$python_dir/pip-audit" --skip-editable
          PATH="$clean_path" "$python_bin" scripts/runtime_requirements.py runtime-requirements.txt
          PATH="$clean_path" "$python_dir/pip-audit" --requirement runtime-requirements.txt
      - name: Build release artifacts once
        run: python -m build
      - name: Inspect release artifacts
        run: python scripts/inspect_artifacts.py dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-packages
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    if: success()
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/supa.cc/0.5.5/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-packages
          path: dist/
      - name: Publish to PyPI with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  verify-pypi:
    needs: publish
    if: success()
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install pipx
        run: python -m pip install pipx
      - name: Verify package from PyPI on POSIX
        if: runner.os != 'Windows'
        shell: bash
        run: |
          installed=0
          for attempt in 1 2 3 4 5 6; do
            if pipx install supa.cc==0.5.5; then
              installed=1
              break
            fi
            sleep 15
          done
          test "$installed" = 1
          supa.cc --version
          supa.cc version
      - name: Verify package from PyPI on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installed = $false
          for ($attempt = 1; $attempt -le 6; $attempt++) {
            pipx install supa.cc==0.5.5
            if ($LASTEXITCODE -eq 0) {
              $installed = $true
              break
            }
            if ($attempt -lt 6) {
              Start-Sleep -Seconds 15
            }
          }
          if (-not $installed) {
            throw "PyPI package supa.cc==0.5.5 was not visible after six attempts."
          }
          supa.cc --version
          supa.cc version
