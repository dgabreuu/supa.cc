name: Validate Homebrew formula

on:
  workflow_dispatch:

permissions: {}

jobs:
  validate:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Update Homebrew metadata
        run: brew update
      - name: Register exact public tap revision
        run: |
          brew tap dgabreuu/supa-cc https://github.com/dgabreuu/supa.cc.git
          tap_repo="$(brew --repo dgabreuu/supa-cc)"
          test "$(git -C "$tap_repo" rev-parse HEAD)" = "$GITHUB_SHA"
      - name: Authorize required formulae
        run: |
          brew trust --formula supabase/tap/supabase
          brew trust --formula dgabreuu/supa-cc/supa-cc
      - name: Install Supabase CLI through formula-scoped trust
        run: brew install --yes supabase/tap/supabase
      - name: Install formula through public flow
        run: brew install --yes dgabreuu/supa-cc/supa-cc
      - name: Verify generated Python resources
        run: |
          tap_repo="$(brew --repo dgabreuu/supa-cc)"
          formula="$tap_repo/Formula/supa-cc.rb"
          brew update-python-resources --ignore-main-package-cooldown "$formula"
          git -C "$tap_repo" diff --exit-code -- Formula/supa-cc.rb
      - name: Audit formula
        run: brew audit --strict --formula dgabreuu/supa-cc/supa-cc
      - name: Verify supported Supabase CLI
        run: |
          minimum_version="2.109.1"
          supabase_version_output="$(supabase --version)"
          ruby -rrubygems -e '
            output, minimum = ARGV
            match = output.match(/(?<!\d)(\d+\.\d+\.\d+(?:[-.][0-9A-Za-z]+)*)(?!\d)/)
            abort "Could not parse Supabase CLI version" unless match
            installed = Gem::Version.new(match[1])
            puts "Installed Supabase CLI version: #{installed}"
            abort "Supabase CLI #{installed} is older than required #{minimum}" if installed < Gem::Version.new(minimum)
          ' "$supabase_version_output" "$minimum_version"
      - name: Verify installed version
        run: |
          supa.cc --version | grep -Fx "supa.cc, version 0.5.7"
          supa.cc version | grep -Fx "Supa.cc v0.5.7"
      - name: Test formula
        run: brew test dgabreuu/supa-cc/supa-cc
