name: Validate Homebrew formula

on:
  workflow_dispatch:

permissions: {}

jobs:
  validate:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Register exact public tap revision
        run: |
          brew tap dgabreuu/supa-cc https://github.com/dgabreuu/supa.cc.git
          tap_repo="$(brew --repo dgabreuu/supa-cc)"
          test "$(git -C "$tap_repo" rev-parse HEAD)" = "$GITHUB_SHA"
          brew trust --formula dgabreuu/supa-cc/supa-cc
      - name: Verify generated Python resources
        run: |
          tap_repo="$(brew --repo dgabreuu/supa-cc)"
          formula="$tap_repo/Formula/supa-cc.rb"
          brew update-python-resources "$formula"
          git -C "$tap_repo" diff --exit-code -- Formula/supa-cc.rb
      - name: Audit formula
        run: brew audit --strict --formula dgabreuu/supa-cc/supa-cc
      - name: Install formula from source
        run: brew install --build-from-source dgabreuu/supa-cc/supa-cc
      - name: Verify installed version
        run: |
          test "$(supa.cc --version)" = "supa.cc, version 0.3.0"
          supa.cc version | grep -Fx "Supa.cc v0.3.0"
      - name: Test formula
        run: brew test dgabreuu/supa-cc/supa-cc
