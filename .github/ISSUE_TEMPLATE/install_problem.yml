name: Installation problem
description: Ask for help installing, upgrading, or starting Supa.cc.
title: "[Installation]: "
labels: [installation]
body:
  - type: markdown
    attributes:
      value: |
        For bugs after a completed installation, use the bug report form.
        **Do not include PATs, tokens, credential dumps, native credential-store items, or complete environment dumps.**
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Include the distribution and version when applicable.
    validations:
      required: true
  - type: input
    id: supa_cc_version
    attributes:
      label: Supa.cc version
      description: Provide the output from `supa.cc --version`, or "unavailable" if the command does not start.
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python version
    validations:
      required: true
  - type: input
    id: supabase_cli_version
    attributes:
      label: Supabase CLI version
    validations:
      required: true
  - type: dropdown
    id: installation_method
    attributes:
      label: Installation method
      options:
        - Homebrew
        - pipx
        - Development installation
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include the installation command and the steps performed.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the complete error message after removing secrets and personal paths.
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Sanitized `supa.cc doctor --json` output
      description: If the command is available, remove account names, personal paths, and identifying data. Never use `--live` for this diagnostic.
      render: json
  - type: checkboxes
    id: safety
    attributes:
      label: Security confirmation
      options:
        - label: I reviewed the report and removed PATs, tokens, credential dumps, and other secrets.
          required: true
