name: Report a bug
description: Report incorrect behavior after a completed installation.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Use the installation form if Supa.cc was not installed correctly.
        **Do not include PATs, tokens, credential dumps, native credential-store items, or complete environment dumps.**
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: For example, macOS 15, Ubuntu 24.04, or Windows 11
    validations:
      required: true
  - type: input
    id: supa_cc_version
    attributes:
      label: Supa.cc version
      description: Output from `supa.cc --version`.
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python version
      description: Output from `python3 --version` or `python --version`.
    validations:
      required: true
  - type: input
    id: supabase_cli_version
    attributes:
      label: Supabase CLI version
      description: Output from `supabase --version`.
    validations:
      required: true
  - type: dropdown
    id: installation_method
    attributes:
      label: Installation method
      options:
        - Homebrew
        - pipx
        - Development installation
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the minimum commands and steps without secrets.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Sanitized `supa.cc doctor --json` output
      description: Remove account names, personal paths, and other identifying data. Never run `--live` to fill this field.
      render: json
  - type: checkboxes
    id: safety
    attributes:
      label: Security confirmation
      options:
        - label: I reviewed the report and removed PATs, tokens, credential dumps, and other secrets.
          required: true
