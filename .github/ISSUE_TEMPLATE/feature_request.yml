name: Suggest a feature
description: Propose an improvement or new behavior for Supa.cc.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Use the dedicated forms for bugs and installation problems.
        **Do not include PATs, tokens, credential dumps, native credential-store items, or complete environment dumps.**
  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      description: Explain the use case without including sensitive data.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior and alternatives considered.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Security confirmation
      options:
        - label: I reviewed the proposal and removed PATs, tokens, credential dumps, and other secrets.
          required: true
